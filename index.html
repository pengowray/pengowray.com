<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="description" content="Pengo Wray — Melbourne, Australia">
<meta name="theme-color" content="#0a0a0d">
<meta property="og:title" content="Pengo Wray">
<meta property="og:description" content="Melbourne, Australia">
<meta property="og:type" content="website">
<title>Pengo Wray</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%230a0a0d'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='40' fill='%23f3f1ea' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#08080b;
    --bg-1:#101015;
    --ink:#f4f2ec;
    --muted:#9a98a4;
    --mx:50vw;
    --my:42vh;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    min-height:100%;
    background:
      radial-gradient(120vmax 120vmax at 50% 18%, var(--bg-1), var(--bg-0) 60%),
      var(--bg-0);
    color:var(--ink);
    font-family:"Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow:hidden;
    display:grid;
    place-items:center;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* faint grain/vignette to add depth without distraction */
  .vignette{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(140vmax 100vmax at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  /* soft light that trails the cursor */
  .glow{
    position:fixed; top:0; left:0; z-index:2; pointer-events:none;
    width:40vmax; height:40vmax; border-radius:50%;
    transform:translate3d(calc(var(--mx) - 50%), calc(var(--my) - 50%), 0);
    background:radial-gradient(closest-side, rgba(255,236,205,.07), rgba(255,236,205,.022) 45%, transparent 70%);
    mix-blend-mode:screen;
    filter:blur(18px);
    transition:transform .18s cubic-bezier(.22,.61,.36,1), opacity .4s;
    will-change:transform;
  }

  .scene{
    position:relative; z-index:4;
    width:100%; height:100%;
    display:grid; place-items:center;
    perspective:1100px;
    padding:6vmin;
    cursor:grab;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
  }
  .scene:active{ cursor:grabbing; }

  .stage{
    transform-style:preserve-3d;
    will-change:transform;
    text-align:center;
    line-height:1;
  }

  /* Depth + shadow live on a wrapper, NOT on the gradient-text element:
     Firefox renders nothing when background-clip:text shares an element with
     a filter and/or a 3D transform. Keeping .name "plain" avoids that. */
  .name-layer{
    transform:translateZ(55px);
    filter:drop-shadow(0 20px 46px rgba(0,0,0,.5));
  }
  .name{
    font-family:"Fraunces", Georgia, "Times New Roman", serif;
    font-weight:400;
    font-size:clamp(3rem, 13vw, 9.5rem);
    line-height:1.12;                 /* room for descenders inside the clip box */
    letter-spacing:-0.015em;
    padding:.06em .08em .24em;        /* keeps g/y tails within the gradient fill */
    color:#ece9f2;                    /* visible fallback if clip-text unsupported */
    background:linear-gradient(176deg, #ffffff 0%, #d6d4dc 58%, #a9a7b4 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;   /* Firefox-safe gradient text */
  }
  .name .amp{ font-style:italic; font-weight:300; }

  .location{
    transform:translateZ(-26px);
    margin-top:clamp(.7rem, 2vw, 1.3rem);   /* air where the dash used to be */
    font-size:clamp(.66rem, 2.1vw, .92rem);
    font-weight:500;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--muted);
    padding-left:.42em; /* optical balance for tracking */
  }

  /* Large, faint symbol sitting behind the name
     The two marks live on their own 3D layers in a shared perspective, so each one
     tilts on its own — independently of the other and of the name above. */
  .symbol{
    position:fixed; inset:0; z-index:3; pointer-events:none;
    display:grid; place-items:center;
    perspective:1400px;
  }
  .symbol svg{
    grid-area:1 / 1;                 /* stack both marks in one centred cell */
    width:min(88vmin, 820px);
    height:min(88vmin, 820px);
    overflow:visible;
    transform-origin:50% 50%;
    will-change:transform;
  }
  .sym-ring{
    fill:none; stroke:url(#symGradA);
    stroke-width:5.6;        /* viewBox units → bold weight that scales with the mark (~13px) */
  }
  .sym-glass{
    fill:none; stroke:url(#symGradB);
    stroke-width:4.4;
    stroke-linejoin:round; stroke-linecap:round;
  }

  /* Motion is the purpose of this page, so interactive (mouse/drag) motion
     stays on even with reduced-motion; only the automatic idle drift and the
     glow's trailing animation are suppressed below (see script + this rule). */
  @media (prefers-reduced-motion: reduce){
    .glow{ transition:none; }
  }
</style>
</head>
<body>
  <div class="vignette"></div>

  <!-- symbol: circle + hourglass, each on its own tilt layer -->
  <div class="symbol" aria-hidden="true">
    <svg id="symRing" viewBox="0 0 100 100">
      <defs>
        <!-- userSpaceOnUse + the shared viewBox makes the fade continuous
             across both marks, so circle and hourglass read as one symbol -->
        <linearGradient id="symGradA" gradientUnits="userSpaceOnUse" x1="0" y1="8" x2="0" y2="92">
          <stop offset="0"   stop-color="#ffffff" stop-opacity=".11"/>
          <stop offset=".6"  stop-color="#d6d4dc" stop-opacity=".085"/>
          <stop offset="1"   stop-color="#a9a7b4" stop-opacity=".06"/>
        </linearGradient>
      </defs>
      <circle class="sym-ring" cx="50" cy="50" r="42"/>
    </svg>
    <svg id="symGlass" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="symGradB" gradientUnits="userSpaceOnUse" x1="0" y1="8" x2="0" y2="92">
          <stop offset="0"   stop-color="#ffffff" stop-opacity=".11"/>
          <stop offset=".6"  stop-color="#d6d4dc" stop-opacity=".085"/>
          <stop offset="1"   stop-color="#a9a7b4" stop-opacity=".06"/>
        </linearGradient>
      </defs>
      <path class="sym-glass" d="M21.7 19 L78.3 19 L50 50 Z M21.7 81 L78.3 81 L50 50 Z"/>
    </svg>
  </div>

  <div class="glow" id="glow"></div>

  <main class="scene" id="scene" aria-label="Pengo Wray — Melbourne, Australia">
    <div class="stage" id="stage">
      <div class="name-layer"><h1 class="name">Pengo&nbsp;Wray</h1></div>
      <p class="location">Melbourne, Australia</p>
    </div>
  </main>

  <script>
  (function(){
    "use strict";

    var reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
    var stage  = document.getElementById("stage");
    var scene  = document.getElementById("scene");
    var symRing  = document.getElementById("symRing");   // circle layer
    var symGlass = document.getElementById("symGlass");  // hourglass layer
    if (!stage) return;   // interactive motion runs regardless; only idle drift respects "reduce"

    // tuning
    var MAX_TILT   = 7.5;    // degrees of hover tilt at screen edge
    var DRAG_SENS  = 0.17;   // degrees per pixel dragged
    var STIFF      = 0.060;  // spring stiffness toward target
    var DAMP       = 0.80;   // velocity damping (inertia after a fling)
    var CLAMP      = 55;     // max rotation in any direction
    var IDLE_DELAY = 2600;   // ms of stillness before gentle idle drift
    var IDLE_AMP   = 1.6;    // degrees of idle drift

    var rot   = { x:0, y:0 };   // current rotation
    var vel   = { x:0, y:0 };   // angular velocity
    var aim   = { x:0, y:0 };   // hover target rotation
    var last  = { x:0, y:0 };   // last pointer pos while dragging
    var dragging = false;
    var lastMove = performance.now();

    // symbol parallax: a normalised pointer that's always live (even mid-drag)
    // plus a smoothed tilt for each mark so they ease, never snap.
    var pn    = { x:0, y:0 };    // pointer in -1..1, updated every move
    var ring  = { x:0, y:0 };    // smoothed circle tilt
    var glass = { x:0, y:0 };    // smoothed hourglass tilt

    function clamp(v, m){ return v < -m ? -m : (v > m ? m : v); }

    // pointer position drives the cursor glow + hover aim
    window.addEventListener("pointermove", function(e){
      document.documentElement.style.setProperty("--mx", e.clientX + "px");
      document.documentElement.style.setProperty("--my", e.clientY + "px");
      lastMove = performance.now();

      // feeds the background symbol even while you drag the name
      pn.x = (e.clientX / innerWidth)  * 2 - 1;
      pn.y = (e.clientY / innerHeight) * 2 - 1;

      if (dragging){
        var dx = e.clientX - last.x;
        var dy = e.clientY - last.y;
        rot.y = clamp(rot.y + dx * DRAG_SENS, CLAMP);
        rot.x = clamp(rot.x - dy * DRAG_SENS, CLAMP);
        vel.y =  dx * DRAG_SENS;   // carry momentum for release
        vel.x = -dy * DRAG_SENS;
        last.x = e.clientX; last.y = e.clientY;
      } else {
        var nx = (e.clientX / innerWidth)  * 2 - 1;
        var ny = (e.clientY / innerHeight) * 2 - 1;
        aim.y =  nx * MAX_TILT;
        aim.x = -ny * MAX_TILT;
      }
    }, { passive:true });

    scene.addEventListener("pointerdown", function(e){
      dragging = true;
      last.x = e.clientX; last.y = e.clientY;
      lastMove = performance.now();
      try { scene.setPointerCapture(e.pointerId); } catch(_){}
    });

    function endDrag(){ dragging = false; }
    window.addEventListener("pointerup", endDrag);
    window.addEventListener("pointercancel", endDrag);

    // device tilt as a bonus on phones/tablets that allow it without a prompt
    window.addEventListener("deviceorientation", function(e){
      if (dragging || e.gamma == null || e.beta == null) return;
      aim.y = clamp(e.gamma, MAX_TILT) / MAX_TILT * MAX_TILT;
      aim.x = clamp(e.beta - 45, MAX_TILT);
      lastMove = performance.now();
    }, true);

    function tick(t){
      if (!dragging){
        var tx = aim.x, ty = aim.y;
        // come alive after a moment of stillness (skipped when the OS asks to reduce motion)
        if (!reduce && t - lastMove > IDLE_DELAY){
          tx += Math.sin(t * 0.00042) * IDLE_AMP;
          ty += Math.cos(t * 0.00055) * IDLE_AMP;
        }
        vel.x += (tx - rot.x) * STIFF;
        vel.y += (ty - rot.y) * STIFF;
      }
      vel.x *= DAMP; vel.y *= DAMP;
      rot.x = clamp(rot.x + vel.x, CLAMP);
      rot.y = clamp(rot.y + vel.y, CLAMP);

      stage.style.transform = "rotateX(" + rot.x.toFixed(3) + "deg) rotateY(" + rot.y.toFixed(3) + "deg)";

      // Background symbol. The hourglass reacts harder to the
      // pointer than the ring, and each gets a slow breath on its own
      // frequency + phase — so the two marks are perpetually a few degrees
      // out of step with each other: tilting independently.
      if (symRing && symGlass){
        var SYM = 7;                       // base pointer tilt (deg)
        // The hourglass swings ~2.5x as far as the ring, so they visibly
        // separate as you move — the requested "tilting independently".
        var rtx = -pn.y * SYM * 0.45;
        var rty =  pn.x * SYM * 0.45;
        var gtx = -pn.y * SYM * 1.15;
        var gty =  pn.x * SYM * 1.15;
        // drift along with the name's drag/fling, but far less than it moves
        rtx += rot.x * 0.20;  rty += rot.y * 0.20;
        gtx += rot.x * 0.26;  gty += rot.y * 0.26;
        if (!reduce){                      // idle breath; off when motion is reduced
          rtx += Math.sin(t * 0.00024) * 1.3;
          rty += Math.cos(t * 0.00031) * 1.3;
          gtx += Math.sin(t * 0.00043 + 1.9) * 2.6;
          gty += Math.cos(t * 0.00037 + 0.7) * 2.6;
        }
        ring.x  += (rtx - ring.x)  * 0.045;
        ring.y  += (rty - ring.y)  * 0.045;
        glass.x += (gtx - glass.x) * 0.060;
        glass.y += (gty - glass.y) * 0.060;
        symRing.style.transform  = "rotateX(" + ring.x.toFixed(3)  + "deg) rotateY(" + ring.y.toFixed(3)  + "deg)";
        symGlass.style.transform = "rotateX(" + glass.x.toFixed(3) + "deg) rotateY(" + glass.y.toFixed(3) + "deg)";
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
